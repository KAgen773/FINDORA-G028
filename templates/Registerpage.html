<!DOCTYPE html>
<html>
<head>
    <title>Register - Findora</title>

<style>
body{
    background-image: url('{{ url_for('static', filename='register image.jpg') }}');
    background-size: cover;
}

.login-container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.login-box {
    background-color: rgba(35, 227, 237, 0.8);
    padding: 20px;
    border-radius: 5px;
    width:300px;
    text-align:center;
}
input{
    width: 90%;
    padding: 10px;
    margin: 10px auto;
}
button{
    padding: 8px 20px;
}   

#successMsg {
    color: green;
    font-weight: bold;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="login-container">
    <form class="login-box" method="POST" action="/register">
        <h2>Register</h2>

        <input type="text" name="username" placeholder="Username" required><br>
        <input type="password" name="password" placeholder="Password" required><br>

        <button type="submit">Register</button><br><br>

        <a href="/">
            <button type="button">Back to Login</button>
        </a>
    </form>
</div>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Findora - Lost & Found</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            background: url("{{ url_for('static', filename='New.gif') }}") no-repeat center center/cover;
            font-family: Arial;
            color: white;
        }

        .overlay {
            background: rgba(0,0,0,0.6);
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        h1 {
            font-size: 50px;
        }

        .menu {
            margin-top: 20px;
        }

        .menu a {
            display: block;
            padding: 15px 30px;
            margin: 10px;
            background: #007BFF;
            color: white;
            text-decoration: none;
            border-radius: 10px;
        }

        .menu a:hover {
            background: #0056b3;
        }
    </style>
</head>

<body>
    <div class="overlay">
        <h1>Findora</h1>
        <div class="menu">
            <a href="#">Report Item</a>
            <a href="#">Search Items</a>
            <a href="#">Login</a>
        </div>
    </div>
</body>
</html>

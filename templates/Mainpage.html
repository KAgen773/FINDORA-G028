<!DOCTYPE html>
<html>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
<head>
    <title>Findora - Lost & Found</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            margin: 0;
            height: 100vh;
            background-image: url("{{ url_for('static', filename='New.gif') }}");
            background-position: center;
            background-repeat: no-repeat;
            background-size: contain;
            background-color: black;
            font-family: Arial;
            color: lightseagreen;
        }

        .icon-bar {
            position: fixed;
            top: 100px;
            left: 0;
            height: 100%;
            width: 90px;
            background-color: transparent;

        }

        .icon-bar a {
            display: block;
            text-align: center;
            padding: 16px;
            transition: all 0.3s ease;
            color: white;
            font-size: 36px;
        }

        .icon-bar a:hover {
            background-color: blue;
        }

        .active {
            background-color: lightseagreen;
        }

        .report-panel {
            position: fixed;
            right: 80px;
            top: 40%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .report-panel h2 {
            font-size: 40px;
            margin-bottom: 20px;
        }

        .report-btn {
            display: block;
            width: 180px;
            text-align: center;
            padding: 15px;
            margin: 10px 0;
            background: transparent;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            transition: 0.3s;
        }

        .report-btn:hover {
            background: blue;
        }

        .overlay {

            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        h1 {
            font-size: 50px;
        }

        .profile {
            text-align: center;
            padding: 10px 0;
            position: fixed;
            top: 15px;
            left: 15px;
            z-index: 1000;
        }

        .profile img {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;

            box-shadow: 0 0 10px rgba(0, 123, 255, 0.8);
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
        }

        .modal-content {
            background: #111;
            margin: 10% auto;
            padding: 30px;
            width: 300px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 0 25px rgba(0, 123, 255, 0.7);
        }

        .modal-content input,
        .modal-content textarea {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: none;
            border-radius: 8px;
        }

        .modal-content button {
            padding: 10px 20px;
            background: #007bff;
            border: none;
            color: white;
            border-radius: 8px;
        }

        .close {
            float: right;
            font-size: 25px;
            cursor: pointer;
        }


    </style>
</head>

<script>
function openForm(type) {
    document.getElementById("formModal").style.display = "block";

    if (type === "lost") {
        document.getElementById("formTitle").innerText = "Report Lost Item";
        document.getElementById("itemType").value = "lost";
    } else {
        document.getElementById("formTitle").innerText = "Report Found Item";
        document.getElementById("itemType").value = "found";
    }
}

function closeForm() {
    document.getElementById("formModal").style.display = "none";
}

</script>

<body>
    <div id="formModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeForm()">&times;</span>

            <h2 id="formTitle">Report</h2>

            <form method="POST" action="/report">
                <input type="hidden" name="type" id="itemType">
                <input type="text" name="item_name" placeholder="Item Name" required>
                <input type="text" name="location" placeholder="Location" required>
                <textarea name="description" placeholder="Description"></textarea>
                <button type="submit">Submit</button>
            </form>
        </div>
    </div>

        <div class="icon-bar">
            <div class="profile">
                <img src="{{ url_for('static', filename='New.gif') }}" alt="profile">
            </div>
        <a class="active" href="/"><i class="fa fa-home"></i></a>
        <a href="#"><i class="fa fa-search"></i></a>
        <a href="#"><i class="fa fa-envelope"></i></a>
        <a href="#"><i class="fa fa-user"></i></a>
        <a href="#"><i class="fa fa-info-circle"></i></a>
    </div>
    <div class="overlay">
        <h1>Findora</h1>

    </div>
    <div class="report-panel">
        <h2>REPORT</h2>
         <a href="#" class="report-btn" onclick="openForm('Lost')">Lost Item</a>
         <a href="#" class="report-btn" onclick="openForm('Found')">Found Item</a>
    </div>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Findora - All Notifications</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <style>
        body {
            background-color: black;
            color: white;
            font-family: Arial, sans-serif;
            padding: 40px;
        }
        .header {
            color: lightseagreen;
            border-bottom: 2px solid lightseagreen;
            padding-bottom: 10px;
            margin-bottom: 30px;
        }
        .notification-list {
            max-width: 600px;
            margin: 0 auto;
        }
        .notification-card {
            background: #111;
            border: 1px solid #222;
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 178, 248, 0.2);
        }
        .back-btn {
            color: lightseagreen;
            text-decoration: none;
            display: inline-block;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <a href="/" class="back-btn"><i class="fa fa-arrow-left"></i> Back to Dashboard</a>
    
    <div class="notification-list">
        <h1 class="header">Recent Lost Items Alerts</h1>
        
        <div class="notification-card">
            <h3>📦 iPhone 13 Pro</h3>
            <p><strong>Last Seen:</strong> Cafeteria</p>
            <p style="color: #aaa;">A new item matching this description was recently reported.</p>
        </div>

        <div class="notification-card">
            <h3>📦 Leather Wallet</h3>
            <p><strong>Last Seen:</strong> Room 302</p>
            <p style="color: #aaa;">A new item matching this description was recently reported.</p>
        </div>
    </div>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Login -Findora</title>
    <style>
    body{
        background-image: url("{{ url_for('static', filename='loginpictures.jpg') }}");
        background-size: cover;
        margin: 0;
    }
    .login-container {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }
    .login-box {
        background-color: rgba(255, 255, 255, 0.15); 
        backdrop-filter: blur(5px);
        padding: 30px;
        border-radius: 10px;
        width: 320px;
        text-align: center;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
    }
    input{
        box-sizing: border-box;
        margin: 10px auto;
        padding: 12px;
        width: 100%;
        border: 1px solid #ccc;
        border-radius: 5px;
    }
    button{
        padding: 10px 20px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        transition: background-color 0.2s;
    }
    .login-container button:hover {
        background-color: rgb(0, 178, 248);
        color: white;
    }
    h2{
        text-align: center;
        color: black;
        font-size: 38px;
        margin-top: 0;
    }
    .register-btn-wrapper button:hover {
        background-color: rgb(3, 175, 255);
        color: white;
    }
    </style>
</head>


<body>
<div class="login-container">
    <form class="login-box" method="POST" action="/login">
      <div class="center">
        <h2>Login</h2>
      </div>

        <input type="email" name='email' placeholder="Email" required>
        <input type="password" name='password' placeholder="Password" required>

        <button type="submit">Login</button>

        <br><br>

        <a href="register.html" class="register-btn-wrapper">
            <button type="button">Register yourself</button>
        </a>

    </form>
</div>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Login - Findora</title>

    <style>
        body {
            background-image: url('{{ url_for("static", filename="photo2.jpg") }}');
            background-position: center;     /* Centers the image horizontally and vertically */
            background-repeat: no-repeat;    /* Prevents the image from tiling/repeating */
            background-size: cover;          /* Forces the image to stretch beautifully to fill the screen */
            background-attachment: fixed;    /* Keeps the background in place while scrolling */
        }
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            button:hover {
            background-color: rgb(0, 178, 248);
            color: white;
        }

        }
        input{
            display: rgb(0, 183, 255);
            margin: 10px auto;
            padding: 10px;
            width: 100%;
        }
        button{
            padding: 8px 20px;
        }
        h2{
            text-align: center;
            color: black;
            font-size: 38px;
            font-variant: inherit;
        }
        Registeryourself{
            button:hover {
            background-color: rgb(3, 175, 255);
            color: white;
        }
        }
    </style>
</head>
<body>

    <div class="login-container">
        <form class="login-box" action="{{ url_for('login') }}" method="POST">
            <h2>Login</h2>

            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
            <button type="button" onclick="window.location.href='/register'">Register yourself</button>
        </form>
    </div>

</body>
</html>
